<!DOCTYPE html>
<html>
<head>
<title>Admin Login</title>

<style>
body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:Arial;
background:url("/static/bg.jpg") center/cover no-repeat;
}

.overlay{
position:absolute;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
}

.box{
position:relative;
background:white;
padding:30px;
border-radius:10px;
width:300px;
}

input{
width:100%;
padding:10px;
margin:10px 0;
}
button{
width:100%;
padding:10px;
background:blue;
color:white;
border:none;
}
</style>

</head>

<body>

<div class="overlay"></div>

<div class="box">

<h2>Admin Login</h2>

<form method="POST">
<input name="username" placeholder="Username">
<input name="password" type="password" placeholder="Password">
<button>Login</button>
</form>

</div>

</body>
</html>
