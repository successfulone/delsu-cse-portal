{% extends "base.html" %}

{% block content %}

<div class="form-box">

    <h2>Admin Login</h2>

    {% if error %}
        <p class="error">{{ error }}</p>
    {% endif %}

    <form method="POST">
        <input type="text" name="username" placeholder="Admin Username">
        <input type="password" name="password" placeholder="Password">
        <button type="submit">Login</button>
    </form>

</div>

{% endblock %}
