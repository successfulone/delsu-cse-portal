{% extends "base.html" %}

{% block content %}

<div class="dashboard">

    <h2>📁 Department Downloads</h2>

    <p>Access lecture notes, forms, timetable and departmental documents.</p>

    <div class="card-grid">

        {% for file in files %}
        <div class="card">
            📄 {{ file }}<br><br>
            <a href="/download/{{ file }}">Download</a>
        </div>
        {% endfor %}

    </div>

</div>

{% endblock %}
