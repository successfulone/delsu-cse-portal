{% extends "base.html" %}
{% block content %}

<div class="card">
    <h2>Department Resources</h2>
    <p>Preview and download academic materials</p>
</div>

<!-- FILE LIST (SAFE VERSION) -->
<div class="card">
    <h2>📁 Available Resources</h2>

    {% if files %}
        {% for f in files %}

        <div style="margin-bottom:15px; padding:10px; border:1px solid #ddd; border-radius:8px;">

            📄 <b>{{ f[1] }}</b><br><br>

            <!-- SAFE LINKS -->
            <a href="/file/{{ f[1] }}" target="_blank">Preview</a> |
            <a href="/file/{{ f[1] }}" download>Download</a>

        </div>

        {% endfor %}
    {% else %}
        <p>No resources uploaded yet.</p>
    {% endif %}

</div>

{% endblock %}
